<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Zetris - Sistema de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <div id="login-page" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
            <h1 class="text-3xl font-extrabold text-center mb-2 text-purple-500 tracking-wide">ZETRIS</h1>
            <p class="text-center text-gray-400 text-sm mb-6">Entre para gerenciar o seu negócio</p>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">E-mail</label>
                    <input type="email" id="login-email" required class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-purple-500 text-white transition"/>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Senha</label>
                    <input type="password" id="login-password" required class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-purple-500 text-white transition"/>
                </div>
                <button type="submit" class="w-full py-3 bg-purple-600 hover:bg-purple-700 font-bold rounded-lg transition shadow-lg shadow-purple-900/40 mt-2">
                    Entrar no Sistema
                </button>
            </form>
        </div>
    </div>

    <div id="main-dashboard" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
            <div class="p-6 border-b border-gray-700">
                <h2 class="text-2xl font-black text-purple-500 tracking-wider">ZETRIS</h2>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchTab('dashboard')" class="w-full text-left px-4 py-2.5 rounded-lg font-medium hover:bg-gray-700 transition">📊 Resumo</button>
                <button onclick="switchTab('customers')" class="w-full text-left px-4 py-2.5 rounded-lg font-medium hover:bg-gray-700 transition">👥 Clientes</button>
                <button onclick="switchTab('products')" class="w-full text-left px-4 py-2.5 rounded-lg font-medium hover:bg-gray-700 transition">📦 Produtos</button>
                <button onclick="switchTab('sales')" class="w-full text-left px-4 py-2.5 rounded-lg font-medium hover:bg-gray-700 transition">💰 Vendas</button>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full py-2 bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white rounded-lg font-semibold transition">
                    Sair
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            <div id="content-area">
                <h1 class="text-3xl font-bold">Bem-vindo ao Zetris</h1>
                <p class="text-gray-400 mt-2">Selecione uma opção no menu ao lado para começar.</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
